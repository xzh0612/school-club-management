server:
  port: 8080

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.club.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000

logging:
  level:
    com.club.mapper: ${MYBATIS_LOG_LEVEL:info}

app:
  bootstrap:
    default-users:
      enabled: ${INIT_DEFAULT_USERS:false}
      password: ${INIT_DEFAULT_USER_PASSWORD:}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/School-Club-Management-System?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
